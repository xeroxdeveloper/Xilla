quickstart:
    base: "🌘🥟 <b>Сәлам.</b> Сезнең юзербот <b>Xilla</b> урнаштырылган.\n❓ <b>Ярдәм кирәкме?</b> Безнең ярдәм чатына керегез. Без <b>һәркемгә</b> булышабыз.\n📼 <b>Сез модульләрне @xillamods_bot аша эзли һәм урнаштыра аласыз. Гади языгыз эзләү запрос һәм басыгыз ⛩ install бу кирәкле модуле</b>\n📣 <b>Комьюнити ясаган модульләр белән каналларны карагыз: <a href=\"https://t.me/xilla_ub/126\">күрсәтергә</a></b>\n💁‍♀️ <b>Тиз белешмәлек:</b>\n1️⃣ <b>Языгыз <b><code>.help</code></b> модульләр исемлеген күрү өчен</b>\n2️⃣ <b>Языгыз</b> <code>.help &lt;Модуль исеме/командасы&gt;</code> <b>модуль тасвирламасын күрү өчен</b>\n3️⃣ <b>Языгыз</b> <code>.dlmod &lt;сылтама&gt;</code> <b>сылтамадан модульне йөкләү өчен</b>\n4️⃣ <b>Языгыз</b> <code>.loadmod</code> <b>файлга җавап, аннан модульне йөкләү өчен</b>\n5️⃣ <b>Языгыз</b> <code>.unloadmod &lt;модуль исеме&gt;</code> <b>модульне бушату өчен</b>\n💡 <b>Xilla Friendly-Telegram һәм GeekTG модульләрен, шулай ук үзенекен хуплый.</b>\n"
    railway: "🚂 <b>Синең юзербот Railway сайтында урнаштырылган</b>. Бу платформада сез айга <b>500 бушлай сәгать аласыз</b>. Лимит җиткәч, сезнең <b>юзербот туңдырылачак</b>. Киләсе айда <b>сез күчәргә тиеш https://railway.app һәм аны яңадан эшләтеп җибәрү</b>."
    lavhost: "✌️ <b>Сезерботың сез lavHost җибәрелде</b>. Ләкин @lavhost җибәрелгән хәбәрләр һәм яңа яңалыклар үзенә алу өчен керегез. Сезербот җибәрелгән хәбәрләр һәм яңа яңалыклар турында сорауларны @lavhostchat җибәрегез."
    language_saved: "🥟 Тел сакланган!"
    language: "🥟 Татар теле"
    btn_support: "🥷 Ярдәм чаты"


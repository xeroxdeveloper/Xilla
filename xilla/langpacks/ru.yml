    setinfo_success: "<emoji document_id=5436040291507247633>🎉</emoji> <b>Текст инфо успешно изменен</b>"
    desc: "<emoji document_id=5188377234380954537>🌘</emoji> <b>Что такое Userbot?</b>\n\n<emoji document_id=5472238129849048175>😎</emoji> Userbot - это <b>сторонняя программа</b>, которая взаимодействует с Telegram API для выполнения <b>автоматизированных задач от имени пользователя</b>. Юзерботы могут использоваться для автоматизации различных задач, таких как <b>отправка сообщений, присоединение к каналам, загрузка медиафайлов и многое другое</b>.\n\n<emoji document_id=5474667187258006816>😎</emoji> Юзерботы отличаются от обычных ботов в Telegram тем, что <b>они работают на аккаунте пользователя</b>, а не на бот-аккаунте. Это означает, что они могут иметь доступ к большему количеству функций и обладают большей гибкостью в плане выполнения действий.\n\n<emoji document_id=5472267631979405211>🚫</emoji> Однако важно отметить, что <b>юзерботы официально не поддерживаются Telegram</b> и их использование может нарушать условия использования платформы. Поэтому <b>пользователи должны быть осторожны при их использовании</b> и убедиться, что на их аккаунте не выполняется вредоносный код.\n\n"
    _cmd_doc_xillainfo: "Отправить информацию по типу 'Что такое Хикка?'"
    _cmd_doc_info: "Отправляет информацию о боте"
    _cmd_doc_setinfo: "<текст> - Изменить текст в .info"


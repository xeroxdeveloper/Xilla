    setinfo_success: "<emoji document_id=5436040291507247633>🎉</emoji> <b>Ақпарат сәтті өзгертілді</b>"
    desc: "<emoji document_id=5188377234380954537>🌘</emoji> <b>Пайдаланушы боттарды қандай болады?</b>\n\n<emoji document_id=5472238129849048175>😎</emoji> Пайдаланушы боттар - <b>шетел программа</b>, ол Telegram API мен қолданушының атымен байланысады және <b>автоматтандырылған жұмыстарды өткізеді</b>. Пайдаланушы боттар <b>хабарламаларды жіберу, каналға қосылу, медиа файлдарды жүктеу және басқа қарастырылмаған жұмыстарды жасау</b> үшін пайдаланылады.\n\n<emoji document_id=5474667187258006816>😎</emoji> Пайдаланушы боттар Telegram боттарынан айырмалы, себебі олар <b>пайдаланушының аккаунтымен жұмыс істейді</b>, бот-аккаунтпен жұмыс істеуге берілмейді. Бұл оларға <b>қатысуға болатын көп көрсеткіштерге және жұмыс істеуге көп құралдарға</b> болатын жақсы құралдарды береді.\n\n<emoji document_id=5472267631979405211>🚫</emoji> Одан қосымша, <b>пайдаланушы боттардың Telegram үшін официалды қолдау көрсетуі жоқ</b> және оларды пайдалану орталығының қолдану шарттарын бүгінге дейін бұзуы мүмкін. Оларды пайдалану <b>қолданушыларға қатысатын нәтижелердің барлығын қарауға</b> мүмкіндік береді.\n\n"
    _cmd_doc_xillainfo: "Бот туралы ақпарат жіберу"

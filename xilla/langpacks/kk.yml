quickstart:
    base: "🌘🇰🇿 <b>Сәлеметсіз бе.</b> Сіздің <b>Xilla</b> ботыңыз орнатылды.\n\n❓ <b>Көмек керек пе?</b> Біздің көмек сөйлесу кітабына кіріңіз. Біз <b>барлық</b>ға көмектесеміз.\n\n📼 <b>Сіз @xillamods_bot арқылы модульді іздеу және орнатуға болады. Тапсырыс іздеу құралын енгізіңіз және керек модульдің үстіндегі ⛩ Install түймесін басыңыз</b>\n\n📣 <b>Комьюнити жасаған модульдердің каналына кіріңіз: <a href=\"https://t.me/xilla_ub/126\">көрсету</a></b>\n\n💁‍♀️ <b>Жылдам құрал:</b>\n\n1️⃣ <b>Модульдер тізімін көру үшін</b> <code>.help</code> <b>жазыңыз</b>\n2️⃣ <b>Модульдің сипаттамасын көру үшін</b> <code>.help &lt;Модуль/команда атауы&gt;</code> <b>жазыңыз</b>\n3️⃣ <b>Сілтемеден модульді орнату үшін</b> <code>.dlmod &lt;сілтеме&gt;</code> <b>жазыңыз</b>\n4️⃣ <b>Файлдан модульді орнату үшін</b> <code>.loadmod</code> <b>жазыңыз</b>\n5️⃣ <b>Модульді жою үшін</b> <code>.unloadmod &lt;Модуль атауы&gt;</code> <b>жазыңыз</b>\n\n💡 <b>Xilla Friendly-Telegram, DragonUserbot және GeekTG модулдерінен, әйтпесе жеңіл модулдерден қамтамасыз етеді.</b>\n"
    railway: "🚂 <b>Сіздің ботыңыз Railway платформасында орнатылды.</b> Бұл платформа <b>айдағы 500 сағаттың бесплаттығын</b> береді. Лимит аяқталғанда, <b>ботыңыз құлыпталады</b>. Келесі айда <b>https://railway.app және оны қайта жүктеу қажет</b>."
    lavhost: "✌️ <b>Сіздің Жеке ботыңыз lavHost-та орнатылған</b>. Маңызды хабарландырулар мен жаңартулар алу үшін @lavhost-ға кіріңіз. Платформа және қателер туралы барлық сұрақтарды @lavhostchat-ға жіберіңіз."
